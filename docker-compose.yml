services:
  app:
    build: .
    image: projeteus-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "8080"
      # Banco SQLite persistido no volume abaixo.
      DATABASE_URL: file:./data/projeteus.db
    volumes:
      - projeteus_data:/app/data
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Reverse proxy com HTTPS automático (Let's Encrypt).
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  projeteus_data:
  caddy_data:
  caddy_config:
