services:
  app:
    build: .
    image: projeteus-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "8080"
      # Banco SQLite persistido no volume abaixo.
      DATABASE_URL: file:./data/projeteus.db
    # Exposto direto numa porta do host (padrão dos demais sistemas da VPS).
    # Troque a porta definindo APP_PORT no .env (default 3020).
    ports:
      - "${APP_PORT:-3020}:8080"
    volumes:
      - projeteus_data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  projeteus_data:
